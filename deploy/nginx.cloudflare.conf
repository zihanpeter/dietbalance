# Nginx 反向代理配置：前面是 Cloudflare（橙云），后面是本机 FoodQuery。
# 只允许 Cloudflare 的 IP 段访问 443，并把真实客户端 IP 从 CF-Connecting-IP 还原。
#
# 使用：
#   sudo cp nginx.cloudflare.conf /etc/nginx/sites-available/foodquery
#   sudo ln -s /etc/nginx/sites-available/foodquery /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# Cloudflare 边缘节点 IP 段（官方列表：https://www.cloudflare.com/ips/）
# 如需自动更新，见 DEPLOYMENT.md 里的 cron 片段。
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

real_ip_header CF-Connecting-IP;
real_ip_recursive on;

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name food.example.com;

    # 这里填写从 Cloudflare 生成的 Origin Certificate（有效期 15 年）
    ssl_certificate     /etc/ssl/cloudflare/food.example.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/food.example.com.key;

    # 让 Cloudflare "Authenticated Origin Pulls" 校验访问来自 CF（可选但推荐）
    # ssl_client_certificate /etc/ssl/cloudflare/authenticated_origin_pull_ca.pem;
    # ssl_verify_client on;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 只把业务流量转给 gunicorn（Docker 方案里 127.0.0.1:8000）
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 30s;
    }

    # /healthz 让 Cloudflare health check / 监控可以直接调用
    location = /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        access_log off;
    }
}

# 禁止从 Cloudflare 之外（即你的源站 IP）直接访问；如果访问到这里说明没走 CF。
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    return 444;
}
